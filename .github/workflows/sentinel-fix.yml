# Sentinel — standalone fix workflow
#
# For cross-org repos that can't `uses:` the AE-private reusable. Vendored
# verbatim into the repo at .github/workflows/sentinel-fix.yml. Same logic
# as sentinel-apply-fix.yml but inline.

name: Sentinel — Apply fix

on:
  workflow_dispatch:
    inputs:
      finding_id:
        required: true
      finding_type:
        required: true
      finding_title:
        required: true
      lane:
        required: true
      package_name:
        required: false
        default: ""
      fix_strategy:
        required: false
        default: "audit-fix"
      override_version:
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Sentinel"
          git config user.email "sentinel@anomalist-enterprise.com"

      - name: Detect stack
        id: stack
        run: |
          {
            echo "has_npm=$([[ -f package-lock.json ]] && echo 1 || echo 0)"
            echo "has_pnpm=$([[ -f pnpm-lock.yaml ]] && echo 1 || echo 0)"
            echo "has_yarn=$([[ -f yarn.lock ]] && echo 1 || echo 0)"
          } >> "$GITHUB_OUTPUT"

      - name: Create fix branch
        run: |
          BRANCH="sentinel/fix/${{ inputs.finding_id }}"
          git checkout -B "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Strategy override (npm)
        if: inputs.fix_strategy == 'override' && steps.stack.outputs.has_npm == '1' && inputs.package_name != '' && inputs.override_version != ''
        env:
          PKG: ${{ inputs.package_name }}
          VER: ${{ inputs.override_version }}
        run: |
          python3 - <<'PY'
          import json, os
          pkg = os.environ['PKG']; ver = os.environ['VER']
          with open('package.json') as f: data = json.load(f)
          ov = data.setdefault('overrides', {})
          ov[pkg] = ver
          with open('package.json', 'w') as f: json.dump(data, f, indent=2); f.write('\n')
          print(f'Added override: {pkg} → {ver}')
          PY
          npm install --package-lock-only --legacy-peer-deps 2>&1 | tail -20 || true
          if git diff --quiet; then echo "no diff"; else echo "FIX_KIND=override" >> "$GITHUB_ENV"; fi

      - name: Strategy override (pnpm)
        if: inputs.fix_strategy == 'override' && steps.stack.outputs.has_pnpm == '1' && inputs.package_name != '' && inputs.override_version != ''
        env:
          PKG: ${{ inputs.package_name }}
          VER: ${{ inputs.override_version }}
        run: |
          npm install -g pnpm@latest >/dev/null 2>&1
          python3 - <<'PY'
          import json, os
          pkg = os.environ['PKG']; ver = os.environ['VER']
          with open('package.json') as f: data = json.load(f)
          pnpm = data.setdefault('pnpm', {})
          ov = pnpm.setdefault('overrides', {})
          ov[pkg] = ver
          with open('package.json', 'w') as f: json.dump(data, f, indent=2); f.write('\n')
          PY
          pnpm install --lockfile-only 2>&1 | tail -20 || true
          if git diff --quiet; then echo "no diff"; else echo "FIX_KIND=override-pnpm" >> "$GITHUB_ENV"; fi

      - name: npm audit fix (non-breaking)
        if: inputs.finding_type == 'dep_vuln' && inputs.fix_strategy == 'audit-fix' && steps.stack.outputs.has_npm == '1'
        run: |
          npm audit fix --package-lock-only || true
          if git diff --quiet; then echo "NEEDS_FORCE=1" >> "$GITHUB_ENV"; else echo "FIX_KIND=audit-patch" >> "$GITHUB_ENV"; fi

      - name: pnpm update
        if: inputs.finding_type == 'dep_vuln' && steps.stack.outputs.has_pnpm == '1' && env.NEEDS_FORCE != '1' && env.FIX_KIND == ''
        run: |
          npm install -g pnpm@latest >/dev/null 2>&1
          if [[ -n "${{ inputs.package_name }}" ]]; then
            pnpm update "${{ inputs.package_name }}" --lockfile-only || true
          fi
          if git diff --quiet; then echo "NEEDS_FORCE=1" >> "$GITHUB_ENV"; else echo "FIX_KIND=pnpm-update" >> "$GITHUB_ENV"; fi

      - name: yarn upgrade
        if: inputs.finding_type == 'dep_vuln' && steps.stack.outputs.has_yarn == '1' && env.NEEDS_FORCE != '1' && env.FIX_KIND == ''
        run: |
          npm install -g yarn >/dev/null 2>&1
          if [[ -n "${{ inputs.package_name }}" ]]; then
            yarn upgrade "${{ inputs.package_name }}" --silent || true
          fi
          if git diff --quiet; then echo "NEEDS_FORCE=1" >> "$GITHUB_ENV"; else echo "FIX_KIND=yarn-upgrade" >> "$GITHUB_ENV"; fi

      # Lane 2 only — `npm audit fix --force` does whatever bumps are needed,
      # including majors and parent-package upgrades for transitive vulns.
      # Lane2 PRs require Chris's approval before merging, so this is safe.
      - name: Lane 2 — npm audit fix --force
        if: env.NEEDS_FORCE == '1' && inputs.lane == 'lane2' && steps.stack.outputs.has_npm == '1'
        run: |
          npm audit fix --force --package-lock-only 2>&1 | head -100 || true
          if git diff --quiet; then
            echo "audit fix --force still no change"
          else
            echo "FIX_KIND=audit-fix-force" >> "$GITHUB_ENV"
            echo "NEEDS_FORCE=" >> "$GITHUB_ENV"
          fi

      - name: Lane 2 — pnpm update --latest
        if: env.NEEDS_FORCE == '1' && inputs.lane == 'lane2' && steps.stack.outputs.has_pnpm == '1'
        run: |
          npm install -g pnpm@latest >/dev/null 2>&1
          if [[ -n "${{ inputs.package_name }}" ]]; then
            pnpm update "${{ inputs.package_name }}" --latest --lockfile-only 2>/dev/null || true
          fi
          if git diff --quiet; then
            echo "pnpm --latest no change"
          else
            echo "FIX_KIND=pnpm-update-latest" >> "$GITHUB_ENV"
            echo "NEEDS_FORCE=" >> "$GITHUB_ENV"
          fi

      - name: Notify Sentinel — no auto-fix available
        if: env.FIX_KIND == ''
        env:
          INGEST_SECRET: ${{ secrets.SENTINEL_INGEST_SECRET }}
        run: |
          BODY=$(jq -n \
            --arg fid "${{ inputs.finding_id }}" \
            --arg lane "${{ inputs.lane }}" \
            --arg reason "audit-fix exhausted (no non-breaking patch + force produced no diff)" \
            '{finding_id: $fid|tonumber, lane: $lane, reason: $reason}')
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$INGEST_SECRET" -hex | sed 's/^.*= //')
          curl -s -X POST -H "Content-Type: application/json" \
            -H "X-Sentinel-Signature: $SIG" \
            --data-binary "$BODY" \
            "https://sentinel.whysharon.uk/api/internal/fix_no_changes" || true

      - name: Bail if no changes
        if: env.FIX_KIND == ''
        run: |
          echo "::warning::No automated fix produced changes — manual intervention required."
          exit 78

      - name: Commit + push
        run: |
          git add -A
          git commit -m "Sentinel: fix ${{ inputs.finding_title }}

          Sentinel finding #${{ inputs.finding_id }} (${{ inputs.finding_type }}, ${{ inputs.lane }}).
          Fix strategy: ${FIX_KIND}.
          See https://sentinel.whysharon.uk/findings/${{ inputs.finding_id }}.

          Co-Authored-By: Sentinel <sentinel@anomalist-enterprise.com>"
          # Sentinel owns sentinel/fix/* branches — force-with-lease keeps
          # safety against concurrent writers but lets us replace stale prior
          # attempts.
          git push -u origin "$BRANCH" --force-with-lease

      - name: Open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY="🤖 Sentinel-authored fix for finding [#${{ inputs.finding_id }}](https://sentinel.whysharon.uk/findings/${{ inputs.finding_id }}).

          - Type: \`${{ inputs.finding_type }}\`
          - Lane: \`${{ inputs.lane }}\`
          - Package: \`${{ inputs.package_name }}\`

          Lane 1 = auto-merges if CI passes. Lane 2 = awaits Approve in dashboard."

          # Reuse an existing open PR for this branch if there is one.
          EXISTING=$(gh pr list --state open --head "$BRANCH" --json url,number --jq '.[0]' 2>/dev/null || echo '{}')
          PR_URL=$(echo "$EXISTING" | jq -r .url)
          PR_NUMBER=$(echo "$EXISTING" | jq -r .number)
          if [[ -z "$PR_URL" || "$PR_URL" == "null" ]]; then
            CREATE_OUT=$(gh pr create \
              --base "$(gh repo view --json defaultBranchRef -q .defaultBranchRef.name)" \
              --head "$BRANCH" \
              --title "Sentinel: ${{ inputs.finding_title }}" \
              --body "$PR_BODY" 2>&1)
            PR_URL=$(echo "$CREATE_OUT" | grep -E "https://github.com" | tail -1)
            if [[ -z "$PR_URL" ]]; then
              echo "::error::gh pr create failed: $CREATE_OUT"
              exit 1
            fi
            PR_NUMBER=$(echo "$PR_URL" | sed -E 's|.*/pull/([0-9]+).*|\1|')
          else
            gh pr edit "$PR_NUMBER" --body "$PR_BODY" >/dev/null 2>&1 || true
          fi
          echo "PR_URL=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Notify Sentinel
        if: always() && steps.pr.outputs.PR_URL != ''
        env:
          INGEST_SECRET: ${{ secrets.SENTINEL_INGEST_SECRET }}
          PR_URL: ${{ steps.pr.outputs.PR_URL }}
          PR_NUMBER: ${{ steps.pr.outputs.PR_NUMBER }}
        run: |
          BODY=$(jq -n \
            --arg fid "${{ inputs.finding_id }}" \
            --arg branch "$BRANCH" \
            --arg pr_url "$PR_URL" \
            --arg pr_number "$PR_NUMBER" \
            --arg lane "${{ inputs.lane }}" \
            '{finding_id: $fid|tonumber, branch: $branch, pr_url: $pr_url, pr_number: $pr_number|tonumber, lane: $lane}')
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$INGEST_SECRET" -hex | sed 's/^.*= //')
          curl -s -X POST -H "Content-Type: application/json" \
            -H "X-Sentinel-Signature: $SIG" \
            --data-binary "$BODY" \
            "https://sentinel.whysharon.uk/api/internal/fix_created"
